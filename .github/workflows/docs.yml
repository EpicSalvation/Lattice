name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'include/**'
      - 'plugins/**/*.h'
      - 'docs/Doxyfile'
      - 'docs/api-overview.md'
      - 'docs/html-header.html'
      - 'docs/fetch-doxygen-theme.sh'
      - 'docs/site/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Doxygen
        run: sudo apt-get update && sudo apt-get install -y doxygen

      - name: Fetch doxygen-awesome-css theme
        run: docs/fetch-doxygen-theme.sh

      - name: Build API docs
        working-directory: docs
        run: doxygen Doxyfile

      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r docs/site/. _site/
          mkdir -p _site/api
          cp -r docs/_build/html/. _site/api/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
